#Device describe config — Redmi Note 13 4G (sapphire / SM6225)
# Gerado com base nos cooling_devices e paths confirmados no dispositivo
# Combina entradas do sistema original + módulo, remove paths inexistentes

#GPU (devfreq)
[
name:gpu
cooling_name:gpu
def_target:0
select_higher:1
]

#battery
[
name:battery
cooling_name:battery
def_target:0
select_higher:0
]

#backlight
[
name:backlight
cooling_name:panel0-backlight
def_target:0
select_higher:1
]

#temp_state (Xiaomi thermal message — controla perfil térmico global)
[
name:temp_state
path:/sys/class/thermal/thermal_message/temp_state
def_target:0
select_higher:1
]

#market_download_limit (limita downloads sob calor)
[
name:market_download_limit
path:/sys/class/thermal/thermal_message/market_download_limit
def_target:0
select_higher:1
]

#thermal_max_brightness (limita brilho máximo sob calor)
[
name:thermal_max_brightness
path:/sys/class/thermal/thermal_message/thermal_max_brightness
def_target:0
select_higher:1
]

#modem PA (amplificador de potência — reduz TX sob calor)
[
name:modem_pa
cooling_name:modem_pa
def_target:0
select_higher:1
]

#modem proc
[
name:modem_proc
cooling_name:modem_proc
def_target:0
select_higher:1
]

#modem vdd
[
name:modem_vdd
cooling_name:modem_vdd
def_target:0
select_higher:1
]

#modem current
[
name:modem_current
cooling_name:modem_current
def_target:0
select_higher:1
]

#modem skin
[
name:modem_skin
cooling_name:modem_skin
def_target:0
select_higher:1
]

#modem wlan
[
name:modem_wlan
cooling_name:modem_wlan
def_target:0
select_higher:1
]

#cdsp (DSP — processamento de áudio/sensores)
[
name:cdsp
cooling_name:cdsp
def_target:0
select_higher:1
]

#ufs (storage — reduz I/O sob calor extremo)
[
name:ufs
cooling_name:ufs
def_target:0
select_higher:1
]
